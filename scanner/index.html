<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner — JCExcellente Attendance</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <!-- jsQR: QR decoder library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    body { margin: 0; background: #000; }
    .scanner-page { min-height: 100vh; background: #111; }
    .scanner-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #1a1a1a; border-bottom: 1px solid #333;
    }
    .scanner-header-bar .brand { display: flex; flex-direction: column; }
    .scanner-header-bar .school-name { color: #4ade80; font-size: .82rem; font-weight: 700; }
    .scanner-header-bar .sys-name   { color: #9ca3af; font-size: .68rem; }
    #camera-wrap {
      position: relative; width: 100%; max-width: 520px; margin: 0 auto;
    }
    #camera-video {
      width: 100%; display: block; background: #000;
      max-height: calc(100vh - 200px); object-fit: cover;
    }
    #camera-canvas { display: none; }
    .scan-overlay {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .scan-box {
      width: 200px; height: 200px;
      border: 3px solid rgba(255,255,255,.85); border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.4);
      animation: scanpulse 2s ease-in-out infinite;
    }
    @keyframes scanpulse {
      0%,100% { border-color: rgba(255,255,255,.85); }
      50% {
        border-color: #4ade80;
        box-shadow: 0 0 0 9999px rgba(0,0,0,.4), 0 0 20px #4ade80;
      }
    }
    #scan-status {
      color: #9ca3af; font-size: .82rem; text-align: center;
      padding: 10px 16px; background: #1a1a1a;
    }
    #error-banner {
      background: #7f1d1d; color: #fca5a5;
      padding: 10px 16px; text-align: center; font-size: .85rem;
    }
    #scan-result { padding: 0 12px 12px; }
    /* result card override for dark bg */
    .result-inner { border-radius: 12px; overflow: hidden; }
    .result-body  { background: #1f1f1f; border-top: none; }
    .result-name  { color: #f9fafb; }
    .result-section { color: #9ca3af; }
    .nav-user-dark {
      display: flex; align-items: center; gap: 10px;
    }
    .btn-logout-dark {
      background: none; border: 1px solid #444; color: #9ca3af;
      padding: 5px 12px; border-radius: 8px; font-size: .78rem; cursor: pointer;
    }
    .btn-logout-dark:hover { background: #333; color: #fff; }
    #user-name-display { color: #9ca3af; font-size: .78rem; }

    /* ── Scanner Tabs ── */
    .scanner-tabs {
      display: flex; max-width: 520px; margin: 0 auto;
      background: #161616; border-bottom: 2px solid #2d2d2d;
    }
    .scanner-tab {
      flex: 1; padding: 11px 8px; text-align: center; cursor: pointer;
      font-size: .82rem; font-weight: 600; color: #6b7280;
      background: none; border: none; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .scanner-tab.tab-active { color: #4ade80; border-bottom-color: #4ade80; }
    .scanner-tab:hover:not(.tab-active) { color: #d1d5db; }

    /* ── RFID Panel ── */
    #rfid-panel {
      max-width: 520px; margin: 0 auto; padding: 32px 16px 20px;
      text-align: center;
    }
    .rfid-icon { font-size: 4rem; margin-bottom: 12px; animation: rfidpulse 2s ease-in-out infinite; }
    @keyframes rfidpulse {
      0%,100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.08); filter: brightness(1.3) drop-shadow(0 0 10px #4ade80); }
    }
    .rfid-label { color: #9ca3af; font-size: .88rem; margin-bottom: 20px; line-height: 1.5; }
    .rfid-divider { color: #4b5563; font-size: .75rem; margin: 16px 0 12px; }
    #rfid-input {
      width: 100%; max-width: 280px; padding: 10px 14px;
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      color: #f9fafb; font-size: .9rem; text-align: center; outline: none;
    }
    #rfid-input::placeholder { color: #4b5563; }
    #rfid-input:focus { border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,.15); }
    #rfid-mode-indicator {
      margin-top: 14px; font-size: .78rem; color: #4ade80;
      background: rgba(74,222,128,.1); border-radius: 8px;
      padding: 6px 14px; display: inline-block;
    }
  </style>
</head>
<body>
<div class="scanner-page">

  <!-- Header -->
  <div class="scanner-header-bar">
    <div class="brand">
      <div class="school-name">JCExcellente Christian Academy</div>
      <div class="sys-name">Attendance Scanner</div>
    </div>
    <div class="nav-user-dark">
      <span id="user-name-display"></span>
      <button class="btn-logout-dark" id="logout-btn">Sign Out</button>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="scanner-tabs">
    <button class="scanner-tab tab-active" id="tab-qr-btn">
      📷 QR Code
    </button>
    <button class="scanner-tab" id="tab-rfid-btn">
      📡 RFID Card
    </button>
  </div>

  <!-- QR Panel -->
  <div id="qr-panel">
    <div id="camera-wrap">
      <video id="camera-video" playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-box"></div>
      </div>
    </div>
  </div>

  <!-- RFID Panel -->
  <div id="rfid-panel" class="hidden">
    <div class="rfid-icon">📡</div>
    <div class="rfid-label">
      Tap or swipe your RFID card near the reader.<br>
      The reader must be connected to this device via USB.
    </div>
    <div class="rfid-divider">— or enter UID manually —</div>
    <input id="rfid-input" type="text" placeholder="Card UID / press Enter" autocomplete="off" />
    <div id="rfid-mode-indicator" class="hidden"></div>
  </div>

  <!-- Status bar -->
  <div id="scan-status">Initializing camera…</div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden"></div>

  <!-- Result card -->
  <div id="scan-result" class="hidden"></div>

</div><!-- /scanner-page -->

<script type="module">
  import { requireRole, logout } from "../assets/js/auth.js";
  import { init } from "../assets/js/scanner.js";

  document.getElementById("logout-btn").addEventListener("click", logout);

  // Auth guard + populate user name
  requireRole("scanner", "principal", "teacher", "registrar")
    .then((user) => {
      document.getElementById("user-name-display").textContent = user.name || user.email;
      init(); // start camera
    })
    .catch(() => {}); // requireRole already redirected
</script>
</body>
</html>
