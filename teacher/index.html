<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance — JCExcellente</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <a class="header-brand" href="../index.html">
      <img src="../assets/images/logo.png" alt="Logo" />
      <div>
        <div class="school-name">JCExcellente Christian Academy</div>
        <div class="sys-name">QR Attendance System</div>
      </div>
    </a>
    <div class="nav-user">
      <span id="user-name"></span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </div>
</header>

<div class="container page-wrap">
  <div class="page-title">Attendance Log</div>
  <div class="page-sub">Real-time attendance records. Updates automatically.</div>

  <!-- Date picker -->
  <div class="filter-bar mb-4">
    <div class="form-group">
      <label class="form-label" for="date-picker">Date</label>
      <input type="date" id="date-picker" class="form-control" />
    </div>
    <div style="align-self:flex-end;">
      <div id="live-badge" class="badge badge-green">● Live</div>
    </div>
  </div>

  <!-- Summary mini-stats -->
  <div class="stat-grid mb-4" id="summary-stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Students Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-in">—</div>
      <div class="stat-label">Time In</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-value" id="stat-out">—</div>
      <div class="stat-label">Time Out</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="att-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Student Name</th>
          <th>Section</th>
          <th>Time In</th>
          <th>Time Out</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="att-body">
        <tr><td colspan="6" class="text-center" style="padding:24px;color:var(--muted);">
          <div class="spinner"></div>Loading…
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
  import { requireRole, logout }          from "../assets/js/auth.js";
  import { watchAttendanceByDate, manilaDate } from "../assets/js/firestore.js";

  let unsub = null; // unsubscribe function for current listener

  document.getElementById("logout-btn").addEventListener("click", logout);

  // Set date picker default to today (Manila)
  const datePicker = document.getElementById("date-picker");
  datePicker.value = manilaDate();

  requireRole("teacher", "principal")
    .then((user) => {
      document.getElementById("user-name").textContent = user.name || user.email;
      loadDate(datePicker.value);
    })
    .catch(() => {});

  datePicker.addEventListener("change", () => {
    const isToday = datePicker.value === manilaDate();
    document.getElementById("live-badge").style.display = isToday ? "" : "none";
    loadDate(datePicker.value);
  });

  function loadDate(date) {
    if (unsub) { unsub(); unsub = null; }

    const tbody = document.getElementById("att-body");
    tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding:24px;color:var(--muted);">
      <div class="spinner"></div>Loading…
    </td></tr>`;

    unsub = watchAttendanceByDate(date, renderLogs);
  }

  function renderLogs(logs) {
    // Build per-student consolidated rows
    // logs is flat (each scan = one log); we pivot to one row per student
    const map = new Map(); // studentId → {name, section, timeIn, timeOut}

    logs.forEach(log => {
      if (!map.has(log.student_id)) {
        map.set(log.student_id, {
          name:    log.student_name,
          section: log.section,
          timeIn:  null,
          timeOut: null,
        });
      }
      const row = map.get(log.student_id);
      if (log.type === "time_in"  && (!row.timeIn  || log.scan_time < row.timeIn))  row.timeIn  = log.scan_time;
      if (log.type === "time_out" && (!row.timeOut || log.scan_time > row.timeOut)) row.timeOut = log.scan_time;
    });

    const rows   = [...map.values()];
    const tbody  = document.getElementById("att-body");
    const inCnt  = rows.filter(r => r.timeIn).length;
    const outCnt = rows.filter(r => r.timeOut).length;

    document.getElementById("stat-total").textContent = rows.length;
    document.getElementById("stat-in").textContent    = inCnt;
    document.getElementById("stat-out").textContent   = outCnt;

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center"
        style="padding:32px;color:var(--muted);">No attendance records for this date.</td></tr>`;
      return;
    }

    // Sort by first time_in
    rows.sort((a, b) => (a.timeIn || "z").localeCompare(b.timeIn || "z"));

    tbody.innerHTML = rows.map((row, i) => {
      const hasOut   = !!row.timeOut;
      const status   = hasOut ? '<span class="badge badge-amber">Left</span>'
                               : '<span class="badge badge-green">Present</span>';
      const timeIn   = row.timeIn  ? fmtTime(row.timeIn)  : '<span class="badge badge-gray">—</span>';
      const timeOut  = row.timeOut ? fmtTime(row.timeOut) : '<span class="badge badge-gray">—</span>';
      return `<tr>
        <td style="color:var(--muted);font-size:.8rem;">${i + 1}</td>
        <td style="font-weight:600;">${esc(row.name)}</td>
        <td>${esc(row.section)}</td>
        <td>${timeIn}</td>
        <td>${timeOut}</td>
        <td>${status}</td>
      </tr>`;
    }).join("");
  }

  function fmtTime(dt) {
    // dt is "YYYY-MM-DD HH:mm:ss" Manila time
    const [, timePart] = dt.split(" ");
    const [h, m]       = timePart.split(":").map(Number);
    const ampm         = h >= 12 ? "PM" : "AM";
    const h12          = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }
</script>
</body>
</html>
