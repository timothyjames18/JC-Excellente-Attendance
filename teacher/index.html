<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance — JCExcellente Teacher</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="header-brand" href="../index.html">
      <img src="../assets/images/logo.png" alt="Logo" />
      <div>
        <div class="school-name">JCExcellente Christian Academy</div>
        <div class="sys-name">QR Attendance System</div>
      </div>
    </a>
    <div class="nav-user">
      <span id="user-name"></span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </div>
</header>

<div class="container page-wrap">
  <div class="page-title">Attendance Log</div>
  <div class="page-sub">Real-time attendance records for your assigned sections.</div>

  <!-- Filter bar -->
  <div class="filter-bar mb-4" style="flex-wrap:wrap;gap:12px;align-items:flex-end;">
    <div class="form-group" style="margin:0;">
      <label class="form-label" for="section-picker">Section</label>
      <select id="section-picker" class="form-control" style="min-width:180px;">
        <option value="">Show all my sections</option>
      </select>
    </div>
    <div class="form-group" style="margin:0;">
      <label class="form-label" for="date-picker">Date</label>
      <input type="date" id="date-picker" class="form-control" />
    </div>
    <div style="display:flex;align-items:flex-end;gap:8px;">
      <div id="live-badge" class="badge badge-green">&#9679; Live</div>
      <button class="btn btn-outline btn-sm" id="export-btn">&#8595; Export CSV</button>
    </div>
  </div>

  <!-- Summary stats -->
  <div class="stat-grid mb-4" id="summary-stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Students Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-in">—</div>
      <div class="stat-label">Time In</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-value" id="stat-out">—</div>
      <div class="stat-label">Time Out</div>
    </div>
    <div class="stat-card" style="--stat-color:#dc2626;">
      <div class="stat-value" id="stat-absent" style="color:#dc2626;">—</div>
      <div class="stat-label">Absent</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="att-table">
      <thead>
        <tr>
          <th>#</th><th>Student Name</th><th>Section</th>
          <th>Time In</th><th>Time Out</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="att-body">
        <tr><td colspan="6" class="text-center" style="padding:24px;color:var(--muted);">
          <div class="spinner"></div>Loading…
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
  import { requireRole, logout }               from "../assets/js/auth.js";
  import { watchAttendanceByDate, getSections, getStudents, getUser, manilaDate } from "../assets/js/firestore.js";

  let unsub           = null;
  let assignedSections = [];  // section IDs this teacher owns
  let allSections      = [];  // full section objects
  let allStudents      = [];  // all active students (for absent detection)
  let currentRows      = [];  // for CSV export

  document.getElementById("logout-btn").addEventListener("click", logout);

  const datePicker    = document.getElementById("date-picker");
  const sectionPicker = document.getElementById("section-picker");
  datePicker.value = manilaDate();

  requireRole("teacher", "principal")
    .then(async (user) => {
      document.getElementById("user-name").textContent = user.name || user.email;

      // Load the teacher's own user doc to get assigned_sections
      const userDoc = await getUser(user.uid);
      assignedSections = (userDoc && userDoc.assigned_sections) ? userDoc.assigned_sections : [];

      // Load all sections and all active students
      allSections = await getSections();
      allStudents = await getStudents();

      // Populate section picker with only teacher's sections
      const mySections = assignedSections.length
        ? allSections.filter(s => assignedSections.includes(s.id))
        : allSections; // principal or no-restriction: show all

      mySections.forEach(s => {
        const o = document.createElement("option");
        o.value = s.id; o.textContent = s.name;
        sectionPicker.appendChild(o);
      });

      loadData();
    })
    .catch(() => {});

  datePicker.addEventListener("change", () => {
    const isToday = datePicker.value === manilaDate();
    document.getElementById("live-badge").style.display = isToday ? "" : "none";
    loadData();
  });

  sectionPicker.addEventListener("change", loadData);

  function loadData() {
    if (unsub) { unsub(); unsub = null; }

    const date      = datePicker.value;
    const sectionId = sectionPicker.value || null;

    // If teacher has assigned sections and "show all" is selected,
    // we can't do a single real-time query across multiple section_ids cleanly.
    // Use null sectionId and client-filter if needed.
    const querySection = sectionId;

    const tbody = document.getElementById("att-body");
    tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding:24px;color:var(--muted);">
      <div class="spinner"></div>Loading…
    </td></tr>`;

    unsub = watchAttendanceByDate(date, (logs) => {
      // Client-side filter: if teacher has assigned sections and no specific one selected,
      // only show logs belonging to their sections
      let filtered = logs;
      if (!querySection && assignedSections.length > 0) {
        filtered = logs.filter(l => !l.section_id || assignedSections.includes(l.section_id));
      }
      renderLogs(filtered);
    }, querySection);
  }

  function renderLogs(logs) {
    const map = new Map();
    logs.forEach(log => {
      if (!map.has(log.student_id)) {
        map.set(log.student_id, { name: log.student_name, section: log.section, section_id: log.section_id, timeIn: null, timeOut: null });
      }
      const row = map.get(log.student_id);
      if (log.type === "time_in"  && (!row.timeIn  || log.scan_time < row.timeIn))  row.timeIn  = log.scan_time;
      if (log.type === "time_out" && (!row.timeOut || log.scan_time > row.timeOut)) row.timeOut = log.scan_time;
    });

    // Determine which section(s) to check for absent students
    const sectionId = sectionPicker.value || null;
    const relevantSectionIds = sectionId
      ? [sectionId]
      : (assignedSections.length > 0 ? assignedSections : allSections.map(s => s.id));

    // Add absent rows: active students in relevant sections who have no scan today
    allStudents.forEach(student => {
      const sid = student.section_id || null;
      if (!relevantSectionIds.includes(sid)) return;
      if (!map.has(student.id)) {
        const secObj = allSections.find(s => s.id === sid);
        map.set(student.id, {
          name: `${student.first_name} ${student.last_name}`,
          section: student.section_name || (secObj ? secObj.name : ""),
          section_id: sid,
          timeIn: null,
          timeOut: null,
          absent: true,
        });
      }
    });

    const rows   = [...map.values()];
    const inCnt  = rows.filter(r => r.timeIn).length;
    const outCnt = rows.filter(r => r.timeOut).length;
    const absCnt = rows.filter(r => !r.timeIn).length;

    document.getElementById("stat-total").textContent  = rows.filter(r => r.timeIn).length;
    document.getElementById("stat-in").textContent     = inCnt;
    document.getElementById("stat-out").textContent    = outCnt;
    document.getElementById("stat-absent").textContent = absCnt;
    currentRows = rows;

    const tbody = document.getElementById("att-body");
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center"
        style="padding:32px;color:var(--muted);">No attendance records for this date.</td></tr>`;
      return;
    }

    // Sort: present/left first (by timeIn), then absent (alphabetically)
    rows.sort((a, b) => {
      if (a.timeIn && b.timeIn) return a.timeIn.localeCompare(b.timeIn);
      if (a.timeIn) return -1;
      if (b.timeIn) return 1;
      return (a.name || "").localeCompare(b.name || "");
    });

    tbody.innerHTML = rows.map((row, i) => {
      let status;
      if (!row.timeIn) {
        status = '<span class="badge badge-red">Absent</span>';
      } else if (row.timeOut) {
        status = '<span class="badge badge-amber">Left</span>';
      } else {
        status = '<span class="badge badge-green">Present</span>';
      }
      const timeIn  = row.timeIn  ? fmtTime(row.timeIn)  : '<span style="color:var(--muted);">—</span>';
      const timeOut = row.timeOut ? fmtTime(row.timeOut) : '<span style="color:var(--muted);">—</span>';
      return `<tr>
        <td style="color:var(--muted);font-size:.8rem;">${i + 1}</td>
        <td style="font-weight:600;">${esc(row.name)}</td>
        <td>${esc(row.section)}</td>
        <td>${timeIn}</td>
        <td>${timeOut}</td>
        <td>${status}</td>
      </tr>`;
    }).join("");
  }

  // ── CSV Export
  document.getElementById("export-btn").addEventListener("click", () => {
    if (currentRows.length === 0) {
      alert("No data to export."); return;
    }
    const date    = datePicker.value;
    const secId   = sectionPicker.value;
    const secName = secId
      ? (allSections.find(s => s.id === secId) || {}).name || secId
      : "all-sections";

    const header  = ["Student Name", "Section", "Time In", "Time Out", "Status"];
    const csvRows = [header, ...currentRows.map(row => [
      row.name, row.section,
      row.timeIn  ? fmtTime(row.timeIn)  : "",
      row.timeOut ? fmtTime(row.timeOut) : "",
      !row.timeIn ? "Absent" : row.timeOut ? "Left" : "Present",
    ])];
    const csv   = csvRows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob  = new Blob([csv], { type: "text/csv" });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement("a");
    a.href      = url;
    a.download  = `attendance_${secName.replace(/\s+/g,'-')}_${date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  function fmtTime(dt) {
    const [, timePart] = dt.split(" ");
    const [h, m]       = timePart.split(":").map(Number);
    const ampm         = h >= 12 ? "PM" : "AM";
    const h12          = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || ""; return d.innerHTML;
  }
</script>
</body>
</html>
